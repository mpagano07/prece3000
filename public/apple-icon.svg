<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e244d" />
      <stop offset="100%" stop-color="#121630" />
    </radialGradient>
    
    <!-- Neon Gradient -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#7000ff" />
      <stop offset="100%" stop-color="#ff00c8" />
    </linearGradient>

    <!-- Subtle Fill Gradient -->
    <linearGradient id="fillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#7000ff" stop-opacity="0.02" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)" />
  
  <!-- Group with glow and gradient stroke -->
  <g stroke="url(#neonGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)">
    
    <!-- Outer Shield -->
    <path d="M 256 120 Q 325 120 400 150 Q 400 320 256 425 Q 112 320 112 150 Q 187 120 256 120 Z" fill="url(#fillGrad)" stroke-width="7" />
    
    <!-- Inner Shield Accent Line -->
    <path d="M 256 142 Q 312 142 378 168 Q 378 305 256 397 Q 134 305 134 168 Q 200 142 256 142 Z" stroke-width="3" opacity="0.7" />

    <!-- Open Book -->
    <!-- Left Page -->
    <path d="M 256 325 Q 210 285 155 295 L 155 215 Q 210 205 256 245 Z" fill="#121630" fill-opacity="0.5" stroke-width="6" />
    <!-- Right Page -->
    <path d="M 256 325 Q 302 285 357 295 L 357 215 Q 302 205 256 245 Z" fill="#121630" fill-opacity="0.5" stroke-width="6" />

    <!-- Book Lines -->
    <path d="M 175 238 Q 205 230 235 253" stroke-width="3" opacity="0.8" />
    <path d="M 175 258 Q 205 250 235 273" stroke-width="3" opacity="0.8" />
    <path d="M 175 278 Q 205 270 235 293" stroke-width="3" opacity="0.8" />
    
    <path d="M 277 253 Q 307 230 337 253" stroke-width="3" opacity="0.8" />
    <path d="M 277 273 Q 307 250 337 273" stroke-width="3" opacity="0.8" />
    <path d="M 277 293 Q 307 270 337 293" stroke-width="3" opacity="0.8" />

    <!-- Stylized Roof structure on top -->
    <path d="M 226 120 L 226 95 L 256 70 L 286 95 L 286 120" stroke-width="4" />
    
    <!-- Stars / Sparkles -->
    <!-- Top Left Star -->
    <path d="M 205 63 Q 205 75 217 75 Q 205 75 205 87 Q 205 75 193 75 Q 205 75 205 63 Z" fill="url(#neonGrad)" stroke="none" />
    <!-- Top Right Star -->
    <path d="M 307 63 Q 307 75 319 75 Q 307 75 307 87 Q 307 75 295 75 Q 307 75 307 63 Z" fill="url(#neonGrad)" stroke="none" />
    
    <!-- Small Stars -->
    <path d="M 165 92 Q 165 97 170 97 Q 165 97 165 102 Q 165 97 160 97 Q 165 97 165 92 Z" fill="#00f0ff" stroke="none" opacity="0.9" />
    <path d="M 347 92 Q 347 97 352 97 Q 347 97 347 102 Q 347 97 342 97 Q 347 97 347 92 Z" fill="#ff00c8" stroke="none" opacity="0.9" />

  </g>

  <!-- Letter E inside roof -->
  <text x="256" y="106" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="900" fill="url(#neonGrad)" text-anchor="middle">E</text>

</svg>
